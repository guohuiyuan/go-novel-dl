<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Novel DL</title>
  <link rel="stylesheet" href="{{ .Root }}/style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Novel DL Web</p>
        <h1>聚合搜索与下载</h1>
        <p class="lead">Web 端现在只展示支持搜索且可下载的小说源。你可以按渠道混合搜索、翻页浏览结果，并直接发起下载任务。</p>
      </div>
      <div class="hero-panel">
        <div class="section-head">
          <h2>默认搜索源</h2>
          <span id="defaultSourceCount" class="count-badge">0</span>
        </div>
        <div class="chip-row" id="defaultSources"></div>
        <p class="panel-note">“推荐渠道”会展示默认启用的搜索下载源，“全部渠道”会展示当前内置的全部可搜索下载源。结果支持跨渠道混合搜索和聚合排序。</p>
      </div>
    </header>

    <section class="search-panel">
      <form id="searchForm" class="search-form">
        <label class="search-field">
          <span class="field-label">关键词</span>
          <input id="keyword" class="search-input" type="text" placeholder="输入书名、作者或关键词" autocomplete="off">
        </label>
        <button class="search-button" type="submit">搜索</button>
      </form>

      <div class="search-toolbar">
        <div class="scope-switch">
          <button type="button" class="scope-pill is-active" data-scope="default">推荐渠道</button>
          <button type="button" class="scope-pill" data-scope="all">全部渠道</button>
        </div>
        <div class="tool-row">
          <button type="button" id="selectSearchableSources" class="tool-button">恢复默认勾选</button>
          <button type="button" id="selectAllSources" class="tool-button">全选当前范围</button>
          <button type="button" id="clearSources" class="tool-button">清空选择</button>
        </div>
      </div>

      <div class="source-tools">
        <div class="section-head">
          <div>
            <h2>渠道选择</h2>
            <p id="sourceSummary" class="panel-note">从渠道列表中勾选要参与搜索的站点。</p>
          </div>
          <span id="selectedCount" class="count-badge">0</span>
        </div>
        <div id="sourceSelector" class="source-selector"></div>
      </div>

      <div class="feedback-grid">
        <div id="status" class="status-card">选择渠道后输入关键词开始搜索。</div>
        <div id="warnings" class="warning-list"></div>
      </div>
    </section>

    <main class="workspace">
      <section class="results-panel">
        <div class="results-head">
          <div>
            <h2>搜索结果</h2>
            <p id="resultMeta" class="panel-note">输入关键词后开始搜索。</p>
          </div>
          <div class="results-tools">
            <span id="resultCount" class="count-badge">0</span>
            <div class="pagination">
              <button type="button" id="prevPage" class="tool-button">上一页</button>
              <span id="pageIndicator" class="page-indicator">第 1 页</span>
              <button type="button" id="nextPage" class="tool-button">下一页</button>
            </div>
          </div>
        </div>
        <div id="results" class="results-grid">
          <div class="empty-state">输入关键词后开始搜索。</div>
        </div>
      </section>

      <aside class="tasks-panel">
        <div class="section-head">
          <h2>下载任务</h2>
          <span id="taskCount" class="count-badge">0</span>
        </div>
        <div id="tasks" class="task-list">
          <div class="empty-state empty-state-compact">还没有下载任务。</div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    window.__NOVEL_DL__ = {
      root: {{ toJSON .Root }},
      defaultSources: {{ toJSON .DefaultSources }},
      allSources: {{ toJSON .AllSources }}
    };
  </script>
  <script src="{{ .Root }}/app.js"></script>
</body>
</html>
