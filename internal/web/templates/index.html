<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Novel DL 聚合搜索与下载</title>
  <link rel="icon" type="image/png" sizes="256x256" href="{{ .Root }}/icon-256.png">
  <link rel="stylesheet" href="{{ .Root }}/style.css">
</head>
<body>
  <button id="openGeneralConfig" class="settings-float" aria-label="设置中心">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </button>

  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy panel-card">
        <p class="eyebrow">Novel DL Web <a href="https://github.com/guohuiyuan/go-novel-dl" target="_blank" rel="noopener noreferrer" style="margin-left: 10px; text-decoration: none; color: inherit;">🔗 GitHub</a></p>
        <h1>聚合搜索与下载</h1>
        <p class="lead">多渠道并发检索，封面点开详情，查看简介、章节并直接发起下载。</p>
      </div>
    </header>

    <nav class="tab-bar" aria-label="主视图">
      <button type="button" id="searchTabButton" class="tab-button is-active" data-tab="search">
        搜索
      </button>
      <button type="button" id="tasksTabButton" class="tab-button" data-tab="tasks">
        下载任务
        <span id="taskTabCount" class="tab-count">0</span>
      </button>
    </nav>

    <section id="searchTabPanel" class="tab-panel is-active">
      <div class="search-layout">
        <section class="panel-card control-panel">
          <form id="searchForm" class="search-form">
            <label class="search-field" for="keyword">
              <span class="field-label">关键词</span>
              <input id="keyword" class="search-input" type="text" placeholder="输入书名、作者、关键词，或直接粘贴小说链接" autocomplete="off">
            </label>
            <button class="search-button" type="submit">开始搜索</button>
          </form>

          <div class="selection-toolbar">
            <button type="button" id="selectAllSources" class="tool-button">全选</button>
            <button type="button" id="clearSources" class="tool-button is-ghost">清空</button>
          </div>

          <section class="source-tag-panel" aria-labelledby="sourceTagHeading">
            <div class="source-tag-panel-head">
              <span id="sourceTagHeading" class="field-label">标签筛选 · 多选取交集</span>
              <button type="button" id="clearTagFilters" class="tool-button is-ghost" hidden>清除标签</button>
            </div>
            <div id="sourceTagFilters" class="source-tag-filters"></div>
          </section>

          <div class="panel-header">
            <div>
              <h2>渠道</h2>
              <p id="sourceSummary" class="panel-hint">高亮即已选。</p>
            </div>
          </div>

          <div id="sourceSelector" class="source-selector"></div>
        </section>
        <div id="siteWarningPanel" class="site-warning-stack" hidden aria-live="polite"></div>

        <section class="panel-card results-panel">
          <div class="feedback-stack">
            <div id="status" class="status-card">选择渠道后输入关键词开始搜索。</div>
            <div id="warnings" class="warning-list"></div>
          </div>

          <div class="results-head">
            <div>
              <h2>搜索结果</h2>
              <p id="resultMeta" class="panel-hint">输入关键词后开始搜索。</p>
            </div>
            <div class="results-tools">
              <span id="resultCount" class="count-badge">0</span>
              <div class="pagination">
                <button type="button" id="prevPage" class="page-button">上一页</button>
                <span id="pageIndicator" class="page-indicator">第 1 页 · 每页 {{.PageSize}} 本</span>
                <button type="button" id="nextPage" class="page-button">下一页</button>
              </div>
            </div>
          </div>

          <div id="results" class="results-grid">
            <div class="empty-state">输入关键词后开始搜索。</div>
          </div>
        </section>
      </div>
    </section>

    <section id="tasksTabPanel" class="tab-panel">
      <section class="panel-card tasks-panel">
        <div class="panel-header">
          <div>
            <h2>下载任务</h2>
            <p class="panel-hint">这里显示当前会话创建的下载任务和导出结果。</p>
          </div>
          <span id="taskCount" class="count-badge">0</span>
        </div>

        <div id="tasks" class="task-list">
          <div class="empty-state empty-state-compact">还没有下载任务。</div>
        </div>
      </section>
    </section>
  </div>

  <div id="siteConfigOverlay" class="site-config-overlay" hidden>
    <div id="siteConfigBackdrop" class="site-config-backdrop"></div>
    <section class="site-config-modal" role="dialog" aria-modal="true" aria-labelledby="siteConfigHeading">
      <div class="site-config-head">
        <h2 id="siteConfigHeading">设置中心</h2>
        <button type="button" id="closeSiteConfig" class="detail-close">关闭</button>
      </div>

      <div class="settings-layout">
        <section class="config-section-card">
          <div class="config-section-head">
            <h3>全局配置</h3>
          </div>
          <form id="generalConfigForm" class="site-config-form">
            <label class="search-field" for="generalWorkers">
              <span class="field-label">默认下载协程 (推荐1-10)</span>
              <div class="range-wrap">
                <input id="generalWorkers" class="search-input slider" type="range" min="1" max="10" step="1">
                <span id="generalWorkersVal" class="range-val">4</span>
              </div>
            </label>
            <label class="search-field" for="generalTimeout">
              <span class="field-label">超时时间 (秒)</span>
              <div class="range-wrap">
                <input id="generalTimeout" class="search-input slider" type="range" min="1" max="60" step="1">
                <span id="generalTimeoutVal" class="range-val">10</span>
              </div>
            </label>
            <label class="search-field" for="generalRequestInterval">
              <span class="field-label">请求间隔 (秒)</span>
              <div class="range-wrap">
                <input id="generalRequestInterval" class="search-input slider" type="range" min="0" max="10" step="0.1">
                <span id="generalRequestIntervalVal" class="range-val">0.5</span>
              </div>
            </label>
            <label class="search-field" for="generalMaxConnections">
              <span class="field-label">最大连接数</span>
              <div class="range-wrap">
                <input id="generalMaxConnections" class="search-input slider" type="range" min="1" max="100" step="1">
                <span id="generalMaxConnectionsVal" class="range-val">10</span>
              </div>
            </label>
            <label class="search-field" for="generalMaxRPS">
              <span class="field-label">最大 RPS</span>
              <div class="range-wrap">
                <input id="generalMaxRPS" class="search-input slider" type="range" min="0.1" max="50" step="0.1">
                <span id="generalMaxRPSVal" class="range-val">5.0</span>
              </div>
            </label>
            <label class="search-field" for="generalRetryTimes">
              <span class="field-label">重试次数</span>
              <div class="range-wrap">
                <input id="generalRetryTimes" class="search-input slider" type="range" min="0" max="10" step="1">
                <span id="generalRetryTimesVal" class="range-val">3</span>
              </div>
            </label>
            <label class="search-field" for="generalBackoffFactor">
              <span class="field-label">退避系数</span>
              <div class="range-wrap">
                <input id="generalBackoffFactor" class="search-input slider" type="range" min="1" max="5" step="0.1">
                <span id="generalBackoffFactorVal" class="range-val">2.0</span>
              </div>
            </label>
            <label class="search-field" for="generalLocaleStyle">
              <span class="field-label">文本风格</span>
              <select id="generalLocaleStyle" class="search-input">
                <option value="simplified">simplified</option>
                <option value="traditional">traditional</option>
              </select>
            </label>
            <label class="search-field" for="generalFormats">
              <span class="field-label">默认导出格式（逗号分隔）</span>
              <input id="generalFormats" class="search-input" type="text" placeholder="txt,epub">
            </label>
            <label class="site-config-check">
              <input id="generalAppendTimestamp" type="checkbox">
              <span>文件名追加时间戳</span>
            </label>
            <label class="site-config-check">
              <input id="generalIncludePicture" type="checkbox">
              <span>默认抓取图片</span>
            </label>
            <label class="search-field" for="generalWebPageSize">
              <span class="field-label">Web 每页数量</span>
              <div class="range-wrap">
                <input id="generalWebPageSize" class="search-input slider" type="range" min="10" max="100" step="1">
                <span id="generalWebPageSizeVal" class="range-val">50</span>
              </div>
            </label>
            <label class="search-field" for="generalCLIPageSize">
              <span class="field-label">CLI 每页数量</span>
              <div class="range-wrap">
                <input id="generalCLIPageSize" class="search-input slider" type="range" min="10" max="100" step="1">
                <span id="generalCLIPageSizeVal" class="range-val">30</span>
              </div>
            </label>
            <label class="search-field" for="generalRawDataDir">
              <span class="field-label">Raw 数据目录</span>
              <input id="generalRawDataDir" class="search-input" type="text">
            </label>
            <label class="search-field" for="generalCacheDir">
              <span class="field-label">缓存目录</span>
              <input id="generalCacheDir" class="search-input" type="text">
            </label>
            <label class="search-field" for="generalOutputDir">
              <span class="field-label">导出目录</span>
              <input id="generalOutputDir" class="search-input" type="text">
            </label>
            <div class="site-config-actions">
              <button id="saveGeneralConfig" type="submit" class="search-button">保存全局配置</button>
            </div>
          </form>
        </section>

        <section class="config-section-card">
          <div class="config-section-head">
            <h3>站点配置</h3>
          </div>
          <form id="siteConfigForm" class="site-config-form">
            <label class="search-field" for="siteConfigKey">
              <span class="field-label">站点</span>
              <select id="siteConfigKey" class="search-input"></select>
            </label>

            <label class="site-config-check">
              <input id="siteLoginRequired" type="checkbox">
              <span>需要登录</span>
            </label>

            <label class="search-field" for="siteWorkerLimit">
              <span class="field-label">下载协程数 (0 为使用全局默认)</span>
              <div class="range-wrap">
                <input id="siteWorkerLimit" class="search-input slider" type="range" min="0" max="10" step="1">
                <span id="siteWorkerLimitVal" class="range-val">0</span>
              </div>
            </label>

            <label class="site-config-check">
              <input id="siteFetchImages" type="checkbox">
              <span>抓取图片（关闭后仅保留文本）</span>
            </label>

            <label class="search-field" for="siteLocaleStyle">
              <span class="field-label">文字转换</span>
              <select id="siteLocaleStyle" class="search-input">
                <option value="">跟随全局</option>
                <option value="original">original</option>
                <option value="traditional">traditional</option>
                <option value="simplified">simplified</option>
              </select>
            </label>

            <label class="search-field" for="siteUsername">
              <span class="field-label">用户名</span>
              <input id="siteUsername" class="search-input" type="text" autocomplete="off">
            </label>

            <label class="search-field" for="sitePassword">
              <span class="field-label">密码</span>
              <div class="input-icon-wrap">
                <input id="sitePassword" class="search-input" type="password" autocomplete="off">
                <button id="toggleSitePassword" type="button" class="input-icon-btn" aria-label="切换可见性">
                  <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </label>

            <label class="search-field" for="siteCookie">
              <span class="field-label">Cookie</span>
              <textarea id="siteCookie" class="site-config-textarea" rows="4" placeholder="name=value; name2=value2"></textarea>
            </label>

            <label class="search-field" for="siteMirrorHosts">
              <span class="field-label">镜像地址（每行一个）</span>
              <textarea id="siteMirrorHosts" class="site-config-textarea" rows="3"></textarea>
            </label>

            <div class="site-config-actions">
              <button id="saveSiteConfig" type="submit" class="search-button">保存配置</button>
            </div>
          </form>
        </section>
      </div>
    </section>
  </div>

  <div id="detailOverlay" class="detail-overlay" hidden>
    <div id="detailBackdrop" class="detail-backdrop"></div>
    <aside class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detailHeading">
      <div class="detail-topbar">
        <button type="button" id="detailCloseButton" class="detail-close">关闭</button>
      </div>
      <div id="detailContent" class="detail-content">
        <div class="empty-state empty-state-compact">点击封面查看小说详情。</div>
      </div>
    </aside>
  </div>

  <button id="backToTop" class="back-to-top" aria-label="回到顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
  </button>

  <script>
    window.__NOVEL_DL__ = {
      root: {{ toJSON .Root }},
      defaultSources: {{ toJSON .DefaultSources }},
      allSources: {{ toJSON .AllSources }},
      siteWarnings: {{ toJSON .SiteWarnings }},
      siteStats: {{ toJSON .SiteStats }},
      generalConfig: {{ toJSON .GeneralConfig }},
      pageSize: {{ toJSON .PageSize }}
    };
  </script>
  <script src="{{ .Root }}/app.js"></script>
</body>
</html>
