services:
  novel-dl:
    image: guohuiyuan/go-novel-dl:latest
    container_name: novel-dl
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/home/appuser/data
    environment:
      - TZ=Asia/Shanghai
    command: ["./novel-dl", "web", "--port", "8080", "--no-browser"]
