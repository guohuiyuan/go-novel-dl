name: Nightly novel-dl Build

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build-novel-dl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Download modules
        run: go mod download

      - name: Build novel-dl
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p output
          name="novel-dl_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            name="${name}.exe"
          fi
          go build -trimpath -ldflags "-s -w" -o "output/${name}" ./cmd/novel-dl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: novel-dl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/*
