name: Release (CLI & Desktop)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-desktop:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch_name: amd64
          - target: i686-pc-windows-msvc
            arch_name: 386
          - target: aarch64-pc-windows-msvc
            arch_name: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Build Go backend
        run: go build -ldflags "-s -w" -o novel-dl.exe ./cmd/novel-dl
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: ${{ matrix.arch_name }}

      - name: Build Rust desktop
        run: cargo build --manifest-path desktop/Cargo.toml --release --target ${{ matrix.target }}

      - name: Package desktop archive
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item desktop/target/${{ matrix.target }}/release/novel-dl-desktop.exe dist/novel-dl-desktop.exe
          Compress-Archive -Path dist/* -DestinationPath go-novel-dl-desktop-windows-${{ matrix.arch_name }}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: go-novel-dl-desktop-windows-${{ matrix.arch_name }}.zip

  build-macos-desktop:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch_name: amd64
          - target: aarch64-apple-darwin
            arch_name: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Install packaging tools
        run: brew install create-dmg

      - name: Build Go backend
        run: go build -ldflags "-s -w" -o novel-dl ./cmd/novel-dl
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: ${{ matrix.arch_name }}

      - name: Build Rust desktop
        run: cargo build --manifest-path desktop/Cargo.toml --release --target ${{ matrix.target }}

      - name: Create DMG & PKG
        run: |
          mkdir -p bundle/NovelDL.app/Contents/MacOS
          mkdir -p bundle/NovelDL.app/Contents/Resources
          mkdir -p bundle/dmg-root

          cp desktop/target/${{ matrix.target }}/release/novel-dl-desktop bundle/NovelDL.app/Contents/MacOS/NovelDL
          chmod +x bundle/NovelDL.app/Contents/MacOS/NovelDL

          mkdir NovelDL.iconset
          sips -z 16 16     desktop/icon.png --out NovelDL.iconset/icon_16x16.png
          sips -z 32 32     desktop/icon.png --out NovelDL.iconset/icon_16x16@2x.png
          sips -z 32 32     desktop/icon.png --out NovelDL.iconset/icon_32x32.png
          sips -z 64 64     desktop/icon.png --out NovelDL.iconset/icon_32x32@2x.png
          sips -z 128 128   desktop/icon.png --out NovelDL.iconset/icon_128x128.png
          sips -z 256 256   desktop/icon.png --out NovelDL.iconset/icon_128x128@2x.png
          sips -z 256 256   desktop/icon.png --out NovelDL.iconset/icon_256x256.png
          sips -z 512 512   desktop/icon.png --out NovelDL.iconset/icon_256x256@2x.png
          sips -z 512 512   desktop/icon.png --out NovelDL.iconset/icon_512x512.png
          iconutil -c icns NovelDL.iconset

          cp NovelDL.icns bundle/NovelDL.app/Contents/Resources/

          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>NovelDL</string><key>CFBundleIdentifier</key><string>com.guohuiyuan.noveldl</string><key>CFBundleName</key><string>NovelDL</string><key>CFBundleIconFile</key><string>NovelDL</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>0.1.0</string><key>LSUIElement</key><true/></dict></plist>' > bundle/NovelDL.app/Contents/Info.plist

          codesign --force --deep --sign - bundle/NovelDL.app || true

          cp -R bundle/NovelDL.app bundle/dmg-root/
          create-dmg --volname "NovelDL Installer" --window-pos 200 120 --window-size 800 400 --app-drop-link 600 185 "go-novel-dl-desktop-macos-${{ matrix.arch_name }}.dmg" "bundle/dmg-root"
          productbuild --component bundle/NovelDL.app /Applications "go-novel-dl-desktop-macos-${{ matrix.arch_name }}.pkg"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            go-novel-dl-desktop-macos-${{ matrix.arch_name }}.dmg
            go-novel-dl-desktop-macos-${{ matrix.arch_name }}.pkg

  build-linux-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev imagemagick libfuse2
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build Go backend
        run: go build -ldflags "-s -w" -o novel-dl ./cmd/novel-dl
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64

      - name: Build Rust desktop
        run: cargo build --manifest-path desktop/Cargo.toml --release

      - name: Package desktop artifacts
        run: |
          tar -czf go-novel-dl-desktop-linux-amd64.tar.gz -C desktop/target/release novel-dl-desktop
          cargo deb --manifest-path desktop/Cargo.toml --no-build --output go-novel-dl-desktop-linux-amd64.deb
          cd desktop
          cargo generate-rpm
          cd ..
          mv desktop/target/generate-rpm/*.rpm go-novel-dl-desktop-linux-amd64.rpm

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps/
          mkdir -p AppDir/usr/share/applications/
          cp desktop/target/release/novel-dl-desktop AppDir/usr/bin/novel-dl-desktop
          convert desktop/icon.png -resize 256x256! AppDir/usr/share/icons/hicolor/256x256/apps/novel-dl.png
          cp desktop/novel-dl.desktop AppDir/usr/share/applications/novel-dl.desktop

          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/novel-dl.png --desktop-file AppDir/usr/share/applications/novel-dl.desktop
          mv *.AppImage go-novel-dl-desktop-linux-amd64.AppImage

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            go-novel-dl-desktop-linux-amd64.tar.gz
            go-novel-dl-desktop-linux-amd64.deb
            go-novel-dl-desktop-linux-amd64.rpm
            go-novel-dl-desktop-linux-amd64.AppImage
